services:
  - type: web
    name: svcii-1
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://svcii.vercel.app,http://localhost:3000
      - key: ANTHROPIC_API_KEY
        sync: false
